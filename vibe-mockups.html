<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Check — Post Submit Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; padding: 40px 20px; color: #1e293b; }

  .page-section {
    background: linear-gradient(135deg, #eff6ff 0%, #ffffff 50%, #f8fafc 100%);
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    max-width: 680px;
    margin: 0 auto;
  }

  .heading { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 12px; }

  .you-are {
    font-size: 1.25rem;
    font-weight: 600;
    color: #3b82f6;
    margin-bottom: 28px;
  }

  .emoji-display { font-size: 3.5rem; margin-bottom: 20px; }

  .result-card {
    background: white;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 28px 32px;
  }
  .collective-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #94a3b8;
    margin-bottom: 12px;
  }
  .collective-vibe { font-size: 2.2rem; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
  .checkin-block { font-size: 0.88rem; color: #94a3b8; line-height: 1.7; margin-bottom: 20px; }
  .next-month { color: #64748b; font-weight: 500; }
  .divider { border: none; border-top: 1px solid #f1f5f9; margin: 0 -32px 20px; }
  .visitor-line { font-size: 0.82rem; color: #94a3b8; }
  .visitor-line span { color: #3b82f6; font-weight: 600; }
</style>
</head>
<body>
  <div class="page-section">
    <div class="heading">What's your vibe right now?</div>
    <div class="you-are">You're Energized ⚡</div>
    <div class="emoji-display">⚡</div>
    <div class="result-card">
      <div class="collective-label">April's Collective Vibe Check</div>
      <div class="collective-vibe">⚡ Energized</div>
      <div class="checkin-block">
        Based on 3 check-ins this month<br>
        <span class="next-month">Check in again in May</span>
      </div>
      <hr class="divider">
      <div class="visitor-line">You're site visitor <span>#3</span></div>
    </div>
  </div>
</body>
</html>
